<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liquid Glass — Demo</title>
<style>
  :root {
    /* tweak these to taste */
    --glass-blur: 8px;
    --glass-saturate: 180%;
    --glass-radius: 28px;
    --glass-tint: rgba(255, 255, 255, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    color: #fff;
    display: grid;
    place-items: center;
    gap: 2rem;
    padding: 4rem 1rem;

    /* A busy, colorful background so the glass has something to refract.
       Swap for a photo to really see it. */
    background:
      radial-gradient(circle at 20% 20%, #ff6b9d 0, transparent 40%),
      radial-gradient(circle at 80% 30%, #4facfe 0, transparent 45%),
      radial-gradient(circle at 50% 80%, #43e97b 0, transparent 45%),
      radial-gradient(circle at 90% 90%, #fa709a 0, transparent 40%),
      #1a1a2e;
    background-attachment: fixed;
  }

  /* ============================================================
     THE GLASS
     ============================================================ */
  .glass {
    position: relative;
    padding: 1.4rem 2rem;
    border-radius: var(--glass-radius);
    isolation: isolate;             /* keep highlight pseudo-elements contained */
    overflow: hidden;

    /* Layer 3 — translucent tint */
    background: var(--glass-tint);

    /* Layers 1 + 2 — blur + saturation/brightness behind the pane.
       url(#refraction) = Layer 5, the SVG lensing filter defined below. */
    backdrop-filter: url(#refraction) blur(var(--glass-blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));

    /* Layer 4 — specular highlights.
       - inset top-left light + bottom-right shadow = the wet 3D rim
       - outer shadow = the pane floating above the page */
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.45),
      inset 0 -1px 1px rgba(255, 255, 255, 0.10),
      inset 0 0 18px rgba(255, 255, 255, 0.06),
      0 8px 32px rgba(0, 0, 0, 0.35);

    border: 1px solid rgba(255, 255, 255, 0.18);
  }

  /* A subtle moving highlight gradient across the top edge — the "liquid" shine */
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.35) 0%,
      rgba(255, 255, 255, 0.05) 30%,
      transparent 50%
    );
    pointer-events: none;
    z-index: -1;
  }

  /* ---- demo content styling ---- */
  .pill { display: flex; gap: 0.5rem; align-items: center; }
  .pill button {
    all: unset; cursor: pointer; padding: 0.6rem 1.1rem; border-radius: 999px;
    font-weight: 600; font-size: 0.95rem;
  }
  .pill button:hover { background: rgba(255,255,255,0.12); }
  h1 { font-size: 1.4rem; margin: 0 0 0.3rem; }
  p  { margin: 0; opacity: 0.85; font-size: 0.95rem; }
  .card { max-width: 360px; }
</style>
</head>
<body>

  <!-- A pill nav, like a control bar -->
  <nav class="glass pill">
    <button>Home</button>
    <button>Explore</button>
    <button>Profile</button>
    <button>Settings</button>
  </nav>

  <!-- A card -->
  <div class="glass card">
    <h1>Liquid Glass</h1>
    <p>Scroll the colorful background under this pane to watch it blur, saturate,
       and refract at the rounded edges. Resize the window too.</p>
  </div>

  <!-- ============================================================
       Layer 5 — REFRACTION via SVG displacement.
       feTurbulence makes a noise map; feDisplacementMap uses it to
       push pixels of the backdrop sideways, faking how a lens bends
       light. Lower scale = subtle, higher = wobbly water.
       ============================================================ -->
  <svg style="position:absolute; width:0; height:0">
    <filter id="refraction" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012"
                    numOctaves="2" seed="42" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="2" result="softNoise" />
      <feDisplacementMap in="SourceGraphic" in2="softNoise"
                         scale="18" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

</body>
</html>
