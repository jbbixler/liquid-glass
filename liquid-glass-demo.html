<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liquid Glass — Minimal Demo</title>

<!-- 1. the package stylesheet (tint, bevel, shine, tint variants) -->
<link rel="stylesheet" href="./src/liquid-glass.css" />

<style>
  /* Page styling only — none of this is required by the package. */
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    color: #fff;
    display: grid;
    place-items: center;
    gap: 2rem;
    padding: 4rem 1rem;

    /* A busy, colorful background so the glass has something to refract.
       Swap for a photo to really see it. */
    background:
      radial-gradient(circle at 20% 20%, #ff6b9d 0, transparent 40%),
      radial-gradient(circle at 80% 30%, #4facfe 0, transparent 45%),
      radial-gradient(circle at 50% 80%, #43e97b 0, transparent 45%),
      radial-gradient(circle at 90% 90%, #fa709a 0, transparent 40%),
      #1a1a2e;
    background-attachment: fixed;
  }

  /* demo content styling */
  .pill { display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem 0.6rem; }
  .pill button {
    all: unset; cursor: pointer; padding: 0.6rem 1.1rem; border-radius: 999px;
    font-weight: 600; font-size: 0.95rem;
  }
  .pill button:hover { background: rgba(255, 255, 255, 0.14); }
  .card { max-width: 360px; padding: 1.6rem 1.9rem; }
  h1 { font-size: 1.4rem; margin: 0 0 0.4rem; }
  p  { margin: 0; opacity: 0.9; font-size: 0.95rem; line-height: 1.55; }
</style>
</head>
<body>

  <!-- 2. markup: add the `glass` class to anything you want to be glass -->
  <nav class="glass pill">
    <button>Home</button>
    <button>Explore</button>
    <button>Profile</button>
    <button>Settings</button>
  </nav>

  <div class="glass card">
    <h1>Liquid Glass</h1>
    <p>The colorful background blurs, saturates, and bends at the rounded edges —
       with a faint chromatic fringe on the rim. Resize the window too.</p>
  </div>

  <!-- 3. the engine: one import, one call -->
  <script type="module">
    import { createLiquidGlass } from "./src/liquid-glass.js";
    createLiquidGlass(".glass");
  </script>

</body>
</html>
